name: Python API Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          mkdir -p reports logs

      - name: Lint and format check
        run: |
          ruff check .
          ruff format --check .

      - name: Validate framework setup
        run: |
          python framework.py doctor

      - name: Run API environment matrix
        run: |
          python framework.py run --matrix --envs mock --markers "smoke or contract" --parallel auto --no-open-report

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-artifacts
          path: |
            reports
            logs
          if-no-files-found: warn
