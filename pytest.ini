[pytest]
testpaths = tests
pythonpath = .
addopts =
    -ra
    --strict-markers
    --alluredir=reports/allure-results
    --clean-alluredir
markers =
    smoke: fast API smoke tests for core confidence
    regression: broader API regression coverage
    e2e: end-to-end API journeys
    contract: schema, OpenAPI, and API contract tests
    graphql: GraphQL operation and contract tests
    rest: REST API tests
    auth: authentication and authorization tests
    security: API security smoke tests for headers and sensitive data leaks
    performance: API response timing and lightweight performance smoke tests
    helpers: unit-style tests for reusable framework helpers
    negative: negative-path API tests
    live: tests that call external or deployed services
    flaky: test can be retried with pytest-rerunfailures
    reporting_demo: intentionally failing test used to demonstrate reports
log_cli = true
log_cli_level = INFO
